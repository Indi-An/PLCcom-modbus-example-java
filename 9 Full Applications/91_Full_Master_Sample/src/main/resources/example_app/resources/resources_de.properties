txtWarning_Text = Dieses Beispielprogramm dient Ihnen zur Anschauung, welche Funktionen Ihnen mit PLCcom f\u00FCr Modbus zur Verf\u00FCgung gestellt werden. Au\u00DFerdem bietet es einfache Programmierbeispiele, zum schnellen Verstehen der Programm-Schnittstelle.\r\nWarnung: \r\nMit dem Produkt PLCcomModbus.Core und auch mit diesem Beispielcode werden Sie oder Dritte in die Lage versetzt nach eigenem Ermessen Anlagen, Maschinen oder \u00C4hnliches zu \u00FCberwachen und zu steuern. Es wird dem Anwender erm\u00F6glicht direkt \u00C4nderungen an einer verbundenen SPS durchzuf\u00FChren. Hierzu muss der Benutzer eigenes Wissen bzw. diverse T\u00E4tigkeiten einflie\u00DFen lassen. Hierdurch k\u00F6nnten z.B. bewegliche Teile an Maschinen ohne Vorwarnung anlaufen. \r\nSchwere Verletzungen bis hin zum Tode sind m\u00F6glich. \r\nDeshalb: Stellen Sie deshalb unbedingt sicher, dass durch Ihre Arbeiten niemand in Gefahr ger\u00E4t! F\u00FChren Sie nur Aktionen durch, bei denen Sie genau wissen was Sie tun. \r\nBeachten Sie auch die Sicherheitshinweise in der EULA.

